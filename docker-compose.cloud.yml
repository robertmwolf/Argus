# Cloud deployment override — use with:
#   docker compose -f docker-compose.yml -f docker-compose.cloud.yml up
#
# Changes from base:
#   - api: S3 storage, SQS queue, full pipeline (Radon + cross-ID, no FAST_MODE)
#   - worker: S3 storage, SQS queue, GPU enabled, profile removed (always runs)
#   - No local uploads volume (files live in S3)

services:

  api:
    environment:
      DATABASE_URL: postgresql+asyncpg://argus:argus@db/argus
      STORAGE_BACKEND: s3
      QUEUE_BACKEND: sqs
      S3_BUCKET: ${S3_BUCKET}
      AWS_REGION: ${AWS_REGION:-us-east-1}
    volumes: []

  worker:
    profiles: []          # Override: always start worker in cloud
    environment:
      DATABASE_URL: postgresql+asyncpg://argus:argus@db/argus
      STORAGE_BACKEND: s3
      QUEUE_BACKEND: sqs
      MODEL_SIZE: large
      S3_BUCKET: ${S3_BUCKET}
      AWS_REGION: ${AWS_REGION:-us-east-1}
    volumes:
      - weights:/app/weights
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  weights:
