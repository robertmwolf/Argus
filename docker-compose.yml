services:

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: argus
      POSTGRES_USER: argus
      POSTGRES_PASSWORD: argus
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U argus -d argus"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://argus:argus@db/argus
      STORAGE_BACKEND: local
      QUEUE_BACKEND: memory
      FAST_MODE: "true"
    env_file:
      - path: .env
        required: false
    volumes:
      - uploads:/app/data/uploads
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped

  # GPU worker — only used in cloud deployment (see docker-compose.cloud.yml).
  # Not started by default; activate with: docker compose --profile worker up
  worker:
    profiles: ["worker"]
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    environment:
      DATABASE_URL: postgresql+asyncpg://argus:argus@db/argus
      STORAGE_BACKEND: local
      QUEUE_BACKEND: memory
      MODEL_SIZE: large
    env_file:
      - path: .env
        required: false
    volumes:
      - uploads:/app/data/uploads
      - weights:/app/weights
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  postgres_data:
  uploads:
  weights:
